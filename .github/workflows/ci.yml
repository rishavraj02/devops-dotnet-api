name: .NET CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: restore dependencies
        run: dotnet restore DevOps.sln

      - name: Build application
        run: dotnet build DevOps.sln --configuration release --no-restore

      - name: Run tests
        run: dotnet test DevOps.sln --configuration release --no-build --verbosity normal

      - name: Publish API
        run: dotnet publish MyDevOpsApi/MyDevOpsApi.csproj -c release -o ./publish

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: devops-api-package
          path: ./publish
